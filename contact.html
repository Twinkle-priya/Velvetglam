<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contact-container {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .contact-container h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #333;
    }

    .contact-container p {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      color: #444;
      font-size: 14px;
      font-weight: bold;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #4facfe;
    }

    .input-group textarea {
      resize: none;
      height: 120px;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .submit-btn:hover {
      background: #2196f3;
    }

    .contact-info {
      margin-top: 25px;
      text-align: center;
      color: #555;
      font-size: 14px;
      line-height: 1.8;
    }
  </style>
</head>

<body>

  <div class="contact-container">
    <h2>Contact Us</h2>

    <p>
      Have questions or feedback? We'd love to hear from you.
    </p>

    <form>
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required />
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required />
      </div>

      <div class="input-group">
        <label>Subject</label>
        <input type="text" placeholder="Enter subject" required />
      </div>

      <div class="input-group">
        <label>Message</label>
        <textarea placeholder="Write your message..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">
        Send Message
      </button>
    </form>

    <div class="contact-info">
      <p>Email: support@healthcareapp.com</p>
      <p>Phone: +91 9876543210</p>
      <p>Location: India</p>
    </div>
  </div>

</body>
</html>
